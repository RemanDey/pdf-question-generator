{% extends 'base.html' %}

{% block title %}Upload PDF - DocuQuiz{% endblock %}

{% block content %}
    <section class="section upload-section">
        <p>Upload a PDF to generate multiple-choice questions or listen to its content.</p>

        <form id="upload-form" method="POST" enctype="multipart/form-data">
            <input type="file" name="pdf_file" accept=".pdf" required>

            <div class="form-fields">
                <div class="form-group">
                    <label for="question_count">Number of Questions</label>
                    <input type="number" id="question_count" name="question_count" value="5" min="1" max="30" required>
                </div>
                <div class="form-group">
                    <label for="hardness">Hardness Level</label>
                    <select id="hardness" name="hardness" required>
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>
            </div>

            <div class="actions actions-split">
                <button type="submit" id="generate-btn" formaction="{{ url_for('generate') }}" class="button-primary">
                    Generate MCQs
                </button>
                <button type="submit" id="listen-btn" formaction="{{ url_for('extract') }}" class="button-secondary">
                    Listen to PDF
                </button>
            </div>
        </form>
    </section>
{% endblock %}
