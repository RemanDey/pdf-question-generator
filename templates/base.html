<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DocuQuiz{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

    <header class="site-header">
        <div class="container">
            <h1 class="logo">DocuQuiz</h1>
            <button class="hamburger" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav class="main-nav">
                <a href="{{ url_for('upload') }}" class="{{ 'active' if active_page == 'upload' else '' }}">Upload PDF</a>
                <a href="{{ url_for('generated') }}" class="{{ 'active' if active_page == 'generated' else '' }}">Generated Questions</a>
                <a href="{{ url_for('listen') }}" class="{{ 'active' if active_page == 'listen' else '' }}">Listen</a>
                <a href="{{ url_for('history') }}" class="{{ 'active' if active_page == 'history' else '' }}">History</a>
                <a href="{{ url_for('about') }}" class="{{ 'active' if active_page == 'about' else '' }}">About</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">&copy; DocuQuiz</div>
    </footer>

    <script src="{{ url_for('static', filename='js/quiz-utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
